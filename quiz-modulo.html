<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSaber+ | Quiz</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz-modulo.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav>
            <span class="nav-logo">🎓 TechSaber+</span>
            <span style="display:flex; gap:0.5rem;">
                <button class="btn-primario" onclick="history.back()">Voltar</button>
                <a href="dashboard-aluno.html"><button class="btn-destaque" style="width:auto;">Sair</button></a>
            </span>
        </nav>
    </header>

    <main class="quiz-main">

        <!-- cabeçalho preenchido pelo JS -->
        <header class="quiz-header">
            <h1 id="quiz-titulo"></h1>
            <p id="quiz-progresso"></p>
        </header>

        <!-- card da questão atual -->
        <section class="quiz-card card" id="quiz-card">
            <h2 id="quiz-pergunta"></h2>
            <ul class="quiz-opcoes" id="quiz-opcoes" role="list"></ul>
            <button class="btn-destaque btn-block" id="btn-enviar"
                onclick="enviarResposta()" disabled aria-label="Enviar resposta">
                Enviar
            </button>
        </section>

    </main>

    <script>
        /*  BANCO DE QUESTÕES
           Cada curso tem quiz1 (5 questões) e quiz2 (5 questões)
           O parâmetro ?quiz=1 ou ?quiz=2 define qual mostrar */
           
        const bancoCursos = {
            "Front-End": {
                quiz1: {
                    titulo: "QUIZ HTML — Front End",
                    perguntas: [
                        { pergunta: "Qual a função da tag <nav>?", opcoes: ["Criar tabelas de navegação", "Agrupar links de navegação principal", "Definir o rodapé da página", "Inserir imagens"], correta: 1 },
                        { pergunta: "O que significa SEO?", opcoes: ["Sistema de Edição Online", "Otimização para motores de busca", "Serviço de Email Operacional", "Software de Execução Online"], correta: 1 },
                        { pergunta: "Para que serve a tag <main>?", opcoes: ["Criar menus", "Definir o cabeçalho", "Identificar o conteúdo principal da página", "Agrupar imagens"], correta: 2 },
                        { pergunta: "Qual a tag para o rodapé?", opcoes: ["&lt;bottom&gt;", "&lt;end&gt;", "&lt;footer&gt;", "&lt;base&gt;"], correta: 2 },
                        { pergunta: "Por que usar HTML semântico?", opcoes: ["Para deixar o site mais rápido", "Para melhorar acessibilidade e SEO", "Para reduzir o tamanho do arquivo", "Para usar menos CSS"], correta: 1 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ CSS — Front End",
                    perguntas: [
                        { pergunta: "Como selecionar uma classe no CSS?", opcoes: ["Usando # antes do nome", "Usando . antes do nome", "Usando @ antes do nome", "Usando & antes do nome"], correta: 1 },
                        { pergunta: "O que faz a propriedade 'background-color'?", opcoes: ["Define a cor do texto", "Define a cor de fundo de um elemento", "Define a cor da borda", "Define a cor do link"], correta: 1 },
                        { pergunta: "Qual a diferença entre margin e padding?", opcoes: ["São a mesma coisa", "Margin é interno, padding é externo", "Margin é espaço externo, padding é espaço interno", "Padding define a borda"], correta: 2 },
                        { pergunta: "O que faz o seletor '#' no CSS?", opcoes: ["Seleciona todos os elementos", "Seleciona uma classe", "Seleciona um elemento pelo ID único", "Seleciona elementos filhos"], correta: 2 },
                        { pergunta: "Para que serve a propriedade 'font-size'?", opcoes: ["Para definir a família da fonte", "Para deixar o texto em negrito", "Para definir o tamanho da letra", "Para alinhar o texto"], correta: 2 }
                    ]
                }
            },
            "Back-End": {
                quiz1: {
                    titulo: "QUIZ C# BÁSICO — Back End",
                    perguntas: [
                        { pergunta: "O que é o CLR no ecossistema .NET?", opcoes: ["Uma biblioteca matemática", "O ambiente de execução que gerencia o código", "Um framework para front-end", "Um banco de dados"], correta: 1 },
                        { pergunta: "C# é uma linguagem de qual tipo?", opcoes: ["Funcional e fracamente tipada", "Orientada a objetos e fortemente tipada", "Scripts e dinâmica", "Procedural sem tipagem"], correta: 1 },
                        { pergunta: "Qual tipo de dado armazena números inteiros?", opcoes: ["string", "bool", "float", "int"], correta: 3 },
                        { pergunta: "O que acontece ao atribuir texto a uma variável 'int'?", opcoes: ["O texto é convertido", "Ocorre um erro de compilação", "O valor é ignorado", "O programa continua"], correta: 1 },
                        { pergunta: "Para que serve o SDK do .NET?", opcoes: ["Gerenciar banco de dados", "Criar interfaces visuais", "Ferramentas para desenvolver e rodar aplicações", "Configurar servidores"], correta: 2 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ POO — Back End",
                    perguntas: [
                        { pergunta: "Para que serve 'using' no topo do arquivo?", opcoes: ["Criar variáveis globais", "Para importar namespaces", "Definir o tipo de retorno", "Inicializar objetos"], correta: 1 },
                        { pergunta: "O que é uma Interface em C#?", opcoes: ["Uma classe abstrata", "Um contrato que define métodos sem implementação", "Um tipo de variável", "Uma herança múltipla"], correta: 1 },
                        { pergunta: "O que é o Garbage Collector?", opcoes: ["Um banco de dados", "Sistema automático de gerenciamento de memória", "Um framework de testes", "Um servidor"], correta: 1 },
                        { pergunta: "O que é LINQ?", opcoes: ["Um banco NoSQL", "Linguagem de consulta integrada para coleções de dados", "Um framework de UI", "Um tipo de interface"], correta: 1 },
                        { pergunta: "Utilidade do 'async/await'?", opcoes: ["Criar interfaces gráficas", "Melhorar responsividade evitando bloqueio da thread", "Compilar código mais rápido", "Gerenciar arquivos"], correta: 1 }
                    ]
                }
            },
            "Banco-de-Dados": {
                quiz1: {
                    titulo: "QUIZ SQL BÁSICO — Banco de Dados",
                    perguntas: [
                        { pergunta: "O que é uma Chave Primária (PK)?", opcoes: ["Um campo opcional", "Um identificador exclusivo para cada registro", "Uma senha de acesso", "Um índice secundário"], correta: 1 },
                        { pergunta: "Qual comando SQL busca dados?", opcoes: ["INSERT", "UPDATE", "SELECT", "DELETE"], correta: 2 },
                        { pergunta: "Para que serve o comando JOIN?", opcoes: ["Deletar registros", "Combinar dados de duas ou mais tabelas", "Criar novos campos", "Ordenar resultados"], correta: 1 },
                        { pergunta: "O que faz o comando WHERE?", opcoes: ["Ordena os resultados", "Agrupa registros", "Filtra resultados com base em uma condição", "Cria uma nova tabela"], correta: 2 },
                        { pergunta: "O que é Normalização?", opcoes: ["Processo de backup", "Conversão de dados", "Processo para reduzir redundâncias", "Criação de índices"], correta: 2 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ SQL AVANÇADO — Banco de Dados",
                    perguntas: [
                        { pergunta: "O que representam as propriedades ACID?", opcoes: ["Tipos de dados SQL", "Garantias de confiabilidade em transações", "Comandos de criação", "Tipos de índices"], correta: 1 },
                        { pergunta: "SQL vs NoSQL: qual a principal diferença?", opcoes: ["SQL é mais moderno", "SQL é relacional; NoSQL é flexível", "NoSQL é mais seguro", "Não há diferença"], correta: 1 },
                        { pergunta: "O que faz o comando GROUP BY?", opcoes: ["Ordena os resultados", "Agrupa linhas com os mesmos valores", "Filtra registros", "Cria índices"], correta: 1 },
                        { pergunta: "O que é uma View?", opcoes: ["Um backup do banco", "Uma tabela virtual baseada em uma consulta SQL", "Um tipo de índice", "Um procedimento armazenado"], correta: 1 },
                        { pergunta: "O que significa o valor NULL?", opcoes: ["Zero numérico", "Texto vazio", "Representa a ausência de valor", "Valor padrão"], correta: 2 }
                    ]
                }
            },
            "Engenharia-de-Software": {
                quiz1: {
                    titulo: "QUIZ SCRUM — Engenharia de Software",
                    perguntas: [
                        { pergunta: "Duração comum de uma Sprint?", opcoes: ["1 a 2 dias", "1 a 4 semanas", "2 a 3 meses", "6 meses a 1 ano"], correta: 1 },
                        { pergunta: "Quem prioriza o Backlog?", opcoes: ["Scrum Master", "Desenvolvedor", "O Product Owner (PO)", "Tech Lead"], correta: 2 },
                        { pergunta: "Objetivo da reunião Daily?", opcoes: ["Definir orçamento", "Encerrar a Sprint", "Alinhamento diário e identificação de bloqueios", "Fazer testes"], correta: 2 },
                        { pergunta: "O que é o Sprint Backlog?", opcoes: ["Lista de clientes", "Tarefas selecionadas para a Sprint atual", "Histórico de Sprints", "Documento de regras"], correta: 1 },
                        { pergunta: "Papel do Scrum Master?", opcoes: ["Criar o código", "Aprovar pagamentos", "Definir todas as tarefas", "Facilitar e remover obstáculos"], correta: 3 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ PRÁTICAS AVANÇADAS — Engenharia de Software",
                    perguntas: [
                        { pergunta: "O que é o Manifesto Ágil?", opcoes: ["Manual técnico de UML", "Documento que prioriza pessoas e entregas", "Conjunto de regras matemáticas", "Contrato jurídico"], correta: 1 },
                        { pergunta: "O que é Dívida Técnica?", opcoes: ["Custo de licenças", "Custo futuro de refatoração por escolhas rápidas", "Multa por atraso", "Tempo em reuniões"], correta: 1 },
                        { pergunta: "O que é Integração Contínua (CI)?", opcoes: ["Reunião diária", "Prática de mesclar código várias vezes ao dia", "Entrega final", "Revisão semanal"], correta: 1 },
                        { pergunta: "O que é Refatoração?", opcoes: ["Adicionar funcionalidades", "Melhorar a estrutura sem alterar o comportamento", "Reescrever do zero", "Corrigir bugs"], correta: 1 },
                        { pergunta: "O que é MVP?", opcoes: ["Produto mais caro", "Versão mais simples para validação de mercado", "Documento de requisitos", "Metodologia de gestão"], correta: 1 }
                    ]
                }
            },
            "Soft-Skills": {
                quiz1: {
                    titulo: "QUIZ COMUNICAÇÃO — Soft Skills",
                    perguntas: [
                        { pergunta: "O que é comunicação assertiva?", opcoes: ["Falar muito alto", "Expressar ideias com clareza e respeito", "Evitar conflitos", "Comunicar só por escrito"], correta: 1 },
                        { pergunta: "O que é escuta ativa?", opcoes: ["Ouvir sem prestar atenção", "Compreender verdadeiramente o que o outro comunica", "Apenas para reuniões formais", "Somente para líderes"], correta: 1 },
                        { pergunta: "O que exige o trabalho em equipe?", opcoes: ["Competição entre membros", "Trabalho individual", "Empatia, respeito e foco no objetivo comum", "Hierarquia rígida"], correta: 2 },
                        { pergunta: "O que é proatividade?", opcoes: ["Esperar ordens", "Agir antecipadamente sem ser solicitado", "Fazer o mínimo", "Delegar tudo"], correta: 1 },
                        { pergunta: "O que é feedback construtivo?", opcoes: ["Crítica sem solução", "Retorno que aponta melhorias de forma respeitosa", "Elogio exagerado", "Avaliação anual"], correta: 1 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ LIDERANÇA — Soft Skills",
                    perguntas: [
                        { pergunta: "O que envolve a liderança?", opcoes: ["Controlar e punir", "Inspirar e motivar equipes", "Fazer tudo sozinho", "Evitar decisões"], correta: 1 },
                        { pergunta: "Para que serve a inteligência emocional?", opcoes: ["Memorizar informações", "Aumentar velocidade de digitação", "Gerenciar conflitos e tomar decisões equilibradas", "Aprender idiomas"], correta: 2 },
                        { pergunta: "O que é resiliência profissional?", opcoes: ["Evitar desafios", "Capacidade de se adaptar e superar adversidades", "Nunca errar", "Trabalhar sob pressão"], correta: 1 },
                        { pergunta: "O que caracteriza um bom líder?", opcoes: ["Microgerenciar a equipe", "Inspirar, delegar e desenvolver pessoas", "Decidir tudo sozinho", "Evitar conflitos"], correta: 1 },
                        { pergunta: "O que é gestão do tempo?", opcoes: ["Trabalhar mais horas", "Organizar prioridades e aumentar produtividade", "Fazer várias coisas ao mesmo tempo", "Delegar tudo"], correta: 1 }
                    ]
                }
            },
            "Acessibilidade-Libras": {
                quiz1: {
                    titulo: "QUIZ LIBRAS BÁSICO — Acessibilidade",
                    perguntas: [
                        { pergunta: "O que é Libras?", opcoes: ["Língua Brasileira de Sinais", "Linguagem Básica de Redes", "Língua Baseada em Raízes", "Linguagem de Símbolos"], correta: 0 },
                        { pergunta: "Libras é universal?", opcoes: ["Sim, mundial", "Não, cada país tem a sua", "Sim, padronizada pela ONU", "Não, só América Latina"], correta: 1 },
                        { pergunta: "O que é Datilologia?", opcoes: ["Estudo dos dedos", "Uso do alfabeto manual para soletrar palavras", "Técnica de digitação", "Leitura labial"], correta: 1 },
                        { pergunta: "Libras é mímica?", opcoes: ["Sim, apenas gestos", "Não, é uma língua completa com gramática própria", "Sim, mas com regras", "Não, é código morse"], correta: 1 },
                        { pergunta: "Expressão facial é importante em Libras?", opcoes: ["Não, só as mãos", "Sim, transmite entonação e sentido à frase", "Só em situações formais", "Apenas para iniciantes"], correta: 1 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ GRAMÁTICA LIBRAS — Acessibilidade",
                    perguntas: [
                        { pergunta: "Qual a lei da Libras no Brasil?", opcoes: ["Lei 8.069/1990", "Lei 10.436/2002", "Lei 13.146/2015", "Lei 9.394/1996"], correta: 1 },
                        { pergunta: "O que são os Classificadores?", opcoes: ["Categorias gramaticais", "Sinais que descrevem formas, tamanhos ou ações", "Tipos de alfabetos", "Expressões faciais"], correta: 1 },
                        { pergunta: "O que é a Configuração de Mão?", opcoes: ["A velocidade do sinal", "O formato que a mão assume ao realizar um sinal", "A direção do movimento", "A expressão facial"], correta: 1 },
                        { pergunta: "O que significa Inclusão?", opcoes: ["Separar pessoas com deficiência", "Eliminar barreiras e garantir participação plena", "Criar escolas especiais", "Adaptar só o físico"], correta: 1 },
                        { pergunta: "O que é o ponto de articulação?", opcoes: ["A intensidade do sinal", "O local no corpo onde o sinal é realizado", "A velocidade", "O número de repetições"], correta: 1 }
                    ]
                }
            },
            "Inteligencia-Artificial": {
                quiz1: {
                    titulo: "QUIZ IA BÁSICO — Inteligência Artificial",
                    perguntas: [
                        { pergunta: "O que é IA Generativa?", opcoes: ["IA que só analisa", "IA capaz de criar conteúdos como textos e imagens", "IA para robótica", "IA para banco de dados"], correta: 1 },
                        { pergunta: "O que caracteriza o Machine Learning?", opcoes: ["Programação manual", "Aprendizado automático a partir de padrões em dados", "Criação de interfaces", "Gerenciamento de redes"], correta: 1 },
                        { pergunta: "O que é Visão Computacional?", opcoes: ["Área que ensina máquinas a interpretar imagens", "Sistema de redes", "Edição de vídeos", "Compressão de arquivos"], correta: 0 },
                        { pergunta: "O que é Viés na IA?", opcoes: ["Técnica de otimização", "Erros derivados de preconceitos nos dados", "Algoritmo de busca", "Forma de criptografia"], correta: 1 },
                        { pergunta: "Exemplo de IA no dia a dia?", opcoes: ["Calculadoras", "Planilhas", "Assistentes de voz e sistemas de recomendação", "Editores de texto"], correta: 2 }
                    ]
                },
                quiz2: {
                    titulo: "QUIZ IA AVANÇADO — Inteligência Artificial",
                    perguntas: [
                        { pergunta: "O que são Redes Neurais?", opcoes: ["Redes de computadores", "Modelos matemáticos inspirados no cérebro", "Tipos de banco de dados", "Algoritmos de busca"], correta: 1 },
                        { pergunta: "O que é o PNL (NLP)?", opcoes: ["Programação de Nível Lógico", "Processamento de Linguagem Natural", "Protocolo de Rede Local", "Plataforma de Nuvem"], correta: 1 },
                        { pergunta: "O que é o Teste de Turing?", opcoes: ["Teste de velocidade", "Teste para verificar se máquina se passa por humano", "Avaliação de algoritmos", "Teste de segurança"], correta: 1 },
                        { pergunta: "O que é Deep Learning?", opcoes: ["Aprendizado superficial", "Subcampo do ML com múltiplas camadas de redes neurais", "Banco de dados", "Linguagem de programação"], correta: 1 },
                        { pergunta: "Importância da Ética na IA?", opcoes: ["Não é importante", "Garantir transparência, segurança e evitar danos sociais", "Só para grandes empresas", "Só em IA médica"], correta: 1 }
                    ]
                }
            }
        };

        /* pega parâmetros da URL */
        const params   = new URLSearchParams(window.location.search);
        const cursoKey = params.get("curso") || "Front-End";
        const quizNum  = params.get("quiz")  || "1";

        /* seleciona o quiz correto */
        const dadosCurso = bancoCursos[cursoKey];
        const quiz       = quizNum === "2" ? dadosCurso.quiz2 : dadosCurso.quiz1;

        let atual             = 0;
        let acertos           = 0;
        let respostaSelecionada = null;

        /* preenche o título */
        document.getElementById("quiz-titulo").textContent = quiz.titulo;

        /* mostra a pergunta atual */
        function mostrarPergunta() {
            const q = quiz.perguntas[atual];

            /* atualiza progresso visual */
            document.getElementById("quiz-progresso").textContent =
                `Pergunta ${atual + 1} de ${quiz.perguntas.length}`;

            /* atualiza texto da pergunta */
            document.getElementById("quiz-pergunta").textContent =
                `${atual + 1}. ${q.pergunta}`;

            /* limpa e reconstrói as opções */
            const opcoes = document.getElementById("quiz-opcoes");
            opcoes.innerHTML = "";
            respostaSelecionada = null;
            document.getElementById("btn-enviar").disabled = true;

            const letras = ["A", "B", "C", "D"];
            q.opcoes.forEach((opcao, i) => {
                const li = document.createElement("li");
                li.className = "quiz-opcao";
                li.setAttribute("role", "listitem");
                li.innerHTML = `<span class="opcao-letra">${letras[i]})</span> ${opcao}`;
                li.onclick = () => selecionarOpcao(li, i);
                opcoes.appendChild(li);
            });
        }

        /* marca a opção selecionada */
        function selecionarOpcao(el, indice) {
            document.querySelectorAll(".quiz-opcao").forEach(op => {
                op.classList.remove("selecionada");
            });
            el.classList.add("selecionada");
            respostaSelecionada = indice;
            document.getElementById("btn-enviar").disabled = false;
        }

        /* processa a resposta enviada */
        function enviarResposta() {
            const q      = quiz.perguntas[atual];
            const opcoes = document.querySelectorAll(".quiz-opcao");

            /* pinta correto (verde) e errado (vermelho) */
            opcoes.forEach((op, i) => {
                op.onclick = null; /* desativa cliques */
                if (i === q.correta)          op.classList.add("correta");
                else if (i === respostaSelecionada) op.classList.add("errada");
            });

            if (respostaSelecionada === q.correta) acertos++;
            document.getElementById("btn-enviar").disabled = true;

            /* avança para próxima questão após 1.2 segundos */
            setTimeout(() => {
                atual++;
                if (atual < quiz.perguntas.length) {
                    mostrarPergunta();
                } else {
                    mostrarResultado();
                }
            }, 1200);
        }

        /* mostra o resultado final do quiz */
        function mostrarResultado() {
            /* precisa acertar 3 de 5 para passar */
            const passou = acertos >= 3;

            /* avança o progresso no localStorage se passou
               quiz 1 passado → progresso = 3 (desbloqueia quiz 2)
               quiz 2 passado → progresso = 4 (desbloqueia avaliação) */

            if (passou) {
                const progressoKey = `progresso-${cursoKey}`;
                const novoProgresso = quizNum === "2" ? 4 : 3;
                const atual = parseInt(localStorage.getItem(progressoKey) || "0");
                if (atual < novoProgresso) {
                    localStorage.setItem(progressoKey, novoProgresso);
                }
            }

            /* define o próximo passo */
            const proximoLink = passou
                ? (quizNum === "2"
                    ? `avaliacao.html?curso=${cursoKey}`
                    : `quiz-modulo.html?curso=${cursoKey}&quiz=2`)
                : `quiz-modulo.html?curso=${cursoKey}&quiz=${quizNum}`;

            const proximoTexto = passou
                ? (quizNum === "2" ? "Ir para Avaliação Final →" : "Próximo: Quiz 2 →")
                : "Tentar novamente";

            /* substitui o conteúdo da tela pelo resultado */
            document.querySelector(".quiz-main").innerHTML = `
                <section class="resultado-card card" aria-live="polite">
                    <h1>${passou ? "🎉 Parabéns!" : "😅 Quase lá!"}</h1>
                    <p>Você acertou <strong>${acertos}</strong> de <strong>${quiz.perguntas.length}</strong></p>
                    <p>${passou
                        ? "Ótimo! Você avançou para a próxima etapa."
                        : "Você precisa acertar pelo menos 3 questões para avançar."
                    }</p>
                    <nav class="resultado-botoes">
                        <a href="${proximoLink}">
                            <button class="btn-destaque">${proximoTexto}</button>
                        </a>
                        <a href="curso.html?curso=${cursoKey}">
                            <button class="btn-primario">Ver Trilha</button>
                        </a>
                    </nav>
                </section>
            `;
        }

        /* inicia o quiz */
        mostrarPergunta();
    </script>

    <script src="js/main.js"></script>

</body>
</html>
