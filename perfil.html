<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSaber+ | Perfil</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav>
            <span class="nav-logo">🎓 TechSaber+</span>
            <span style="display:flex; gap:0.5rem;">
                <a href="dashboard-aluno.html"><button class="btn-primario">Voltar</button></a>
            </span>
        </nav>
    </header>

    <main class="perfil-main">

        <!-- LINHA 1: ALUNO + OFENSIVA -->
        <section class="perfil-topo">

            <!-- card aluno - só visual -->
            <article class="card perfil-aluno">
                <img src="assets/images/avatar.png" alt="Foto do aluno" class="perfil-avatar"
                     onerror="this.style.display='none'">
                <span class="perfil-avatar-emoji" id="avatar-emoji">🧑‍💻</span>
                <span class="perfil-info">
                    <h1 id="perfil-nome">Aluno</h1>
                    <p>
                        <span>📖</span>
                        <span id="perfil-curso">BANCO DE DADOS - ANDAMENTO</span>
                    </p>
                </span>
            </article>

            <!-- card ofensiva - clicável -->
            <article class="card ofensiva-card" onclick="localStorage.setItem('origemOfensiva','perfil.html'); window.location.href='ofensiva.html'">
                <span class="ofensiva-fogo">🔥</span>
                <strong class="ofensiva-numero" id="dias-consecutivos">12</strong>
                <p>DIAS CONSECUTIVOS</p>
                <span class="ofensiva-barras">
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra"></span>
                    <span class="barra"></span>
                </span>
            </article>

        </section>

        <!-- LINHA 2: STATS -->
        <section class="perfil-stats">

            <article class="card stat-card">
                <span class="stat-icone">📚</span>
                <p class="stat-label">CURSOS INICIADOS</p>
                <strong class="stat-valor" id="cursos-iniciados">0</strong>
            </article>

            <article class="card stat-card">
                <span class="stat-icone">🏆</span>
                <p class="stat-label">DIAS ATIVOS</p>
                <strong class="stat-valor" id="dias-ativos">0</strong>
            </article>

            <article class="card stat-card">
                <span class="stat-icone">✅</span>
                <p class="stat-label">ETAPAS CONCLUÍDAS</p>
                <strong class="stat-valor" id="etapas-concluidas">0 / 35</strong>
            </article>

        </section>

    </main>

    <script>
        const todosCursos = ["Front-End","Back-End","Banco-de-Dados","Engenharia-de-Software","Soft-Skills","Acessibilidade-Libras","Inteligencia-Artificial"];

        /* cursos iniciados */
        const cursosIniciados = todosCursos.filter(c => parseInt(localStorage.getItem(`progresso-${c}`) || "0") > 0).length;
        document.getElementById("cursos-iniciados").textContent = cursosIniciados;

        /* dias consecutivos */
        const dias = parseInt(localStorage.getItem("diasConsecutivos") || "0");
        document.getElementById("dias-consecutivos").textContent = dias;
        document.getElementById("dias-ativos").textContent = dias;

        /* etapas concluídas */
        const totalEtapas = todosCursos.reduce((acc, c) => acc + parseInt(localStorage.getItem(`progresso-${c}`) || "0"), 0);
        document.getElementById("etapas-concluidas").textContent = `${totalEtapas} / 35`;

        /* ultimo curso */
        const ultimoCursoNome = localStorage.getItem("ultimoCursoNome");
        if (ultimoCursoNome) {
            document.getElementById("perfil-curso").textContent = ultimoCursoNome.toUpperCase() + " - ANDAMENTO";
        }

        /* barras ofensiva */
        const barras = document.querySelectorAll(".ofensiva-barras .barra");
        barras.forEach((b, i) => {
            if (i < dias) b.classList.add("ativa");
            else b.classList.remove("ativa");
        });
    </script>

    <script src="js/main.js"></script>

</body>
</html>
