<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSaber+ | Avaliação</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz-modulo.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <nav>
            <span class="nav-logo">🎓 TechSaber+</span>
            <span style="display:flex; gap:0.5rem;">
                <button class="btn-primario" onclick="history.back()">Voltar</button>
                <a href="index.html"><button class="btn-destaque">Sair</button></a>
            </span>
        </nav>
    </header>

    <main class="quiz-main">

        <header class="quiz-header">
            <h1 id="quiz-titulo"></h1>
            <p id="quiz-progresso"></p>
        </header>

        <section class="quiz-card card" id="quiz-card">
            <h2 id="quiz-pergunta"></h2>
            <ul class="quiz-opcoes" id="quiz-opcoes"></ul>
            <button class="btn-destaque btn-block" id="btn-enviar" onclick="enviarResposta()" disabled>Enviar</button>
        </section>

    </main>

    <script>
        const todasAvaliacoes = {
            "Front-End": {
                titulo: "AVALIAÇÃO FRONT END",
                perguntas: [
                    { pergunta: "O que é o DOM?", opcoes: ["Um tipo de banco de dados", "Representação em árvore da estrutura HTML", "Uma linguagem de programação", "Um servidor web"], correta: 1 },
                    { pergunta: "O que faz o atributo 'lang' na tag <html>?", opcoes: ["Define o tamanho da fonte", "Define o idioma principal do documento", "Define a cor de fundo", "Define o charset"], correta: 1 },
                    { pergunta: "Diferença entre <b> e <strong>?", opcoes: ["São idênticos", "strong tem peso semântico, b é apenas visual", "b é mais moderno", "strong é para títulos"], correta: 1 },
                    { pergunta: "O que é o DOCTYPE?", opcoes: ["Uma tag de estilo", "Instrução que diz ao navegador qual versão do HTML usar", "Um tipo de comentário", "Uma tag de script"], correta: 1 },
                    { pergunta: "Para que serve a tag <section>?", opcoes: ["Criar listas", "Inserir imagens", "Agrupar conteúdos relacionados tematicamente", "Definir navegação"], correta: 2 },

                    { pergunta: "O que é um elemento inline?", opcoes: ["Ocupa toda a largura disponível", "Ocupa apenas a largura necessária (ex: span)", "Cria novos blocos", "Define margens automáticas"], correta: 1 },

                    { pergunta: "Para que serve 'using' no topo do arquivo?", opcoes: ["Criar variáveis globais", "Para importar namespaces", "Definir o tipo de retorno", "Inicializar objetos"], correta: 1 },
                    { pergunta: "O que é uma Interface em C#?", opcoes: ["Uma classe abstrata", "Um contrato que define métodos sem implementação", "Um tipo de variável", "Uma herança múltipla"], correta: 1 },
                    { pergunta: "Explique o modificador 'static'.", opcoes: ["Torna o método privado", "Pertence à classe em si, não a uma instância", "Impede herança", "Cria métodos virtuais"], correta: 1 },
                    { pergunta: "Qual a função do bloco 'try-catch'?", opcoes: ["Melhorar performance", "Tratamento de exceções e erros", "Criar loops", "Importar bibliotecas"], correta: 1 },
                    { pergunta: "O que é LINQ?", opcoes: ["Um banco de dados NoSQL", "Linguagem de consulta integrada para coleções de dados", "Um framework de UI", "Um tipo de interface"], correta: 1 },
                    { pergunta: "Utilidade do 'async/await'?", opcoes: ["Criar interfaces gráficas", "Melhorar responsividade evitando bloqueio da thread", "Compilar código mais rápido", "Gerenciar arquivos"], correta: 1 }
                ]
            },
            "Banco-de-Dados": {
                titulo: "AVALIAÇÃO BANCO DE DADOS",
                perguntas: [
                    { pergunta: "O que representam as propriedades ACID?", opcoes: ["Tipos de dados no SQL", "Garantias de confiabilidade em transações", "Comandos de criação de tabelas", "Tipos de índices"], correta: 1 },
                    { pergunta: "SQL vs NoSQL: qual a principal diferença?", opcoes: ["SQL é mais moderno", "SQL é relacional; NoSQL é flexível/não-relacional", "NoSQL é mais seguro", "Não há diferença"], correta: 1 },
                    { pergunta: "O que é uma Chave Estrangeira (FK)?", opcoes: ["Uma senha de acesso", "Campo que cria um vínculo entre duas tabelas", "Um índice primário", "Um tipo de view"], correta: 1 },
                    { pergunta: "Para que serve o comando UPDATE?", opcoes: ["Buscar dados", "Deletar tabelas", "Modificar dados já existentes", "Criar novas colunas"], correta: 2 },
                    { pergunta: "O que faz o comando GROUP BY?", opcoes: ["Ordena os resultados", "Agrupa linhas com os mesmos valores", "Filtra registros", "Cria índices"], correta: 1 },
                    { pergunta: "O que é um Data Warehouse?", opcoes: ["Um tipo de tabela", "Sistema de armazenamento consolidado para análise", "Um comando SQL", "Um banco de dados temporário"], correta: 1 },
                    { pergunta: "Função do comando DELETE?", opcoes: ["Modificar registros", "Criar tabelas", "Remover registros de uma tabela", "Buscar dados"], correta: 2 },
                    { pergunta: "O que é uma View?", opcoes: ["Um backup do banco", "Uma tabela virtual baseada em uma consulta SQL", "Um tipo de índice", "Um procedimento armazenado"], correta: 1 },
                    { pergunta: "O que significa o valor NULL?", opcoes: ["Zero numérico", "Texto vazio", "Representa a ausência de valor", "Valor padrão do sistema"], correta: 2 },
                    { pergunta: "O que faz o comando ORDER BY?", opcoes: ["Agrupa resultados", "Filtra registros", "Ordena resultados ascendente ou descendente", "Cria chaves primárias"], correta: 2 }
                ]
            },
            "Engenharia-de-Software": {
                titulo: "AVALIAÇÃO ENGENHARIA DE SOFTWARE",
                perguntas: [
                    { pergunta: "O que é o Manifesto Ágil?", opcoes: ["Manual técnico da linguagem UML", "Documento que prioriza pessoas e entregas sobre processos rígidos", "Conjunto de regras matemáticas", "Contrato jurídico de desenvolvimento"], correta: 1 },
                    { pergunta: "Defina Dívida Técnica.", opcoes: ["Custo de licenças de software", "Custo futuro de refatoração por escolhas rápidas", "Multa por atraso de projeto", "Tempo gasto em reuniões"], correta: 1 },
                    { pergunta: "O que é Integração Contínua (CI)?", opcoes: ["Reunião diária do time", "Prática de mesclar código várias vezes ao dia", "Entrega final do produto", "Revisão de código semanal"], correta: 1 },
                    { pergunta: "O que diz a Regra de Pareto em testes?", opcoes: ["100% dos testes devem passar", "80% dos defeitos estão em 20% dos módulos", "50% do tempo é gasto em testes", "Todos os bugs devem ser corrigidos antes do deploy"], correta: 1 },
                    { pergunta: "Diferença entre Teste Unitário e de Integração?", opcoes: ["Unitário testa partes isoladas; Integração testa o conjunto", "São a mesma coisa", "Integração é feito antes do Unitário", "Unitário é mais completo"], correta: 0 },
                    { pergunta: "O que é Refatoração?", opcoes: ["Adicionar novas funcionalidades", "Melhorar a estrutura sem alterar o comportamento externo", "Reescrever o sistema do zero", "Corrigir bugs críticos"], correta: 1 },
                    { pergunta: "Para que serve o Diagrama de Sequência no UML?", opcoes: ["Mostrar a estrutura de classes", "Mostrar a ordem de interações entre objetos no tempo", "Definir o banco de dados", "Criar wireframes"], correta: 1 },
                    { pergunta: "O que é MVP?", opcoes: ["Produto mais caro do mercado", "Versão mais simples para validação de mercado", "Documento de requisitos", "Metodologia de gestão"], correta: 1 },
                    { pergunta: "O que caracteriza Microserviços?", opcoes: ["Um único serviço centralizado", "Serviços pequenos e independentes que se comunicam", "Banco de dados único", "Interface monolítica"], correta: 1 },
                    { pergunta: "O que é o Product Backlog?", opcoes: ["Lista de bugs do sistema", "Lista ordenada de tudo necessário para o produto", "Relatório de Sprint", "Documento de arquitetura"], correta: 1 }
                ]
            },
            "Soft-Skills": {
                titulo: "AVALIAÇÃO SOFT SKILLS",
                perguntas: [
                    { pergunta: "O que é feedback construtivo?", opcoes: ["Crítica sem solução", "Retorno que aponta melhorias de forma respeitosa", "Elogio exagerado", "Avaliação anual de desempenho"], correta: 1 },
                    { pergunta: "O que é empatia no trabalho?", opcoes: ["Ignorar os problemas dos colegas", "Capacidade de se colocar no lugar do outro", "Dar ordens sem explicação", "Trabalhar isoladamente"], correta: 1 },
                    { pergunta: "Como resolver conflitos em equipe?", opcoes: ["Ignorar o problema", "Impor sua opinião", "Ouvir todas as partes e buscar consenso", "Reportar ao gestor imediatamente"], correta: 2 },
                    { pergunta: "O que é proatividade?", opcoes: ["Esperar ordens para agir", "Agir antecipadamente sem precisar ser solicitado", "Fazer apenas o mínimo necessário", "Delegar todas as tarefas"], correta: 1 },
                    { pergunta: "Qual a importância da escuta ativa?", opcoes: ["Nenhuma, o que importa é falar", "Compreender verdadeiramente o que o outro comunica", "Apenas para reuniões formais", "Somente para líderes"], correta: 1 },
                    { pergunta: "O que é resiliência profissional?", opcoes: ["Evitar desafios difíceis", "Capacidade de se adaptar e superar adversidades", "Nunca cometer erros", "Trabalhar sob pressão sempre"], correta: 1 },
                    { pergunta: "Para que serve o networking?", opcoes: ["Apenas para conseguir emprego", "Construir relações profissionais mutuamente benéficas", "Aumentar seguidores nas redes sociais", "Apenas para vendedores"], correta: 1 },
                    { pergunta: "O que é criatividade no ambiente de trabalho?", opcoes: ["Fazer coisas sem planejamento", "Gerar novas ideias e soluções para problemas", "Ignorar processos estabelecidos", "Trabalhar de forma desorganizada"], correta: 1 },
                    { pergunta: "O que caracteriza um bom líder?", opcoes: ["Controlar e microgerenciar a equipe", "Inspirar, delegar e desenvolver as pessoas", "Tomar todas as decisões sozinho", "Evitar conflitos a qualquer custo"], correta: 1 },
                    { pergunta: "Qual a importância da inteligência emocional?", opcoes: ["Nenhuma no ambiente profissional", "Gerenciar emoções para tomar decisões equilibradas", "Apenas para profissionais de RH", "Somente em situações de crise"], correta: 1 }
                ]
            },
            "Acessibilidade-Libras": {
                titulo: "AVALIAÇÃO LIBRAS",
                perguntas: [
                    { pergunta: "Qual a lei da Libras no Brasil?", opcoes: ["Lei 8.069 de 1990", "Lei 10.436 de 2002", "Lei 13.146 de 2015", "Lei 9.394 de 1996"], correta: 1 },
                    { pergunta: "O que caracteriza a Cultura Surda?", opcoes: ["Ausência de comunicação", "Valores e costumes próprios da comunidade surda", "Uso exclusivo de leitura labial", "Dependência de intérpretes"], correta: 1 },
                    { pergunta: "O que é um Sinal-Nome?", opcoes: ["O nome escrito em Libras", "Identificação única dada a uma pessoa pela comunidade surda", "Uma forma de assinatura", "Um sinal universal"], correta: 1 },
                    { pergunta: "Qual o papel do intérprete de Libras?", opcoes: ["Substituir a Libras pelo português", "Traduzir e mediar a comunicação entre ouvintes e surdos", "Ensinar Libras nas escolas", "Criar novos sinais"], correta: 1 },
                    { pergunta: "O que são os Classificadores?", opcoes: ["Categorias gramaticais", "Sinais que descrevem formas, tamanhos ou ações", "Tipos de alfabetos manuais", "Expressões faciais específicas"], correta: 1 },
                    { pergunta: "O que é a Configuração de Mão?", opcoes: ["A velocidade do sinal", "O formato que a mão assume ao realizar um sinal", "A direção do movimento", "A expressão facial usada"], correta: 1 },
                    { pergunta: "O que significa Inclusão?", opcoes: ["Separar pessoas com deficiência", "Eliminar barreiras e garantir participação plena de todos", "Criar escolas especiais", "Adaptar apenas o ambiente físico"], correta: 1 },
                    { pergunta: "Como se diz 'Oi' em Libras?", opcoes: ["Acenar com a mão aberta", "Através de configuração específica (letras O e I)", "Bater palmas", "Apontar para si mesmo"], correta: 1 },
                    { pergunta: "Pessoa surda pode dirigir?", opcoes: ["Não, é proibido por lei", "Sim, utilizando sinalizações visuais e retrovisores", "Apenas em velocidade reduzida", "Somente com acompanhante"], correta: 1 },
                    { pergunta: "O que é o ponto de articulação?", opcoes: ["A intensidade do sinal", "O local no corpo onde o sinal é realizado", "A velocidade de execução", "O número de repetições"], correta: 1 }
                ]
            },
            "Inteligencia-Artificial": {
                titulo: "AVALIAÇÃO INTELIGÊNCIA ARTIFICIAL",
                perguntas: [
                    { pergunta: "O que são Redes Neurais?", opcoes: ["Redes de computadores", "Modelos matemáticos inspirados no cérebro", "Tipos de banco de dados", "Algoritmos de busca"], correta: 1 },
                    { pergunta: "O que é o PNL (NLP)?", opcoes: ["Programação de Nível Lógico", "Processamento de Linguagem Natural", "Protocolo de Rede Local", "Plataforma de Nuvem Linux"], correta: 1 },
                    { pergunta: "O que caracteriza o Big Data?", opcoes: ["Pequenos volumes de dados precisos", "Volumes massivos de dados para treinar modelos", "Dados organizados em planilhas", "Banco de dados relacionais"], correta: 1 },
                    { pergunta: "O que é o Teste de Turing?", opcoes: ["Teste de velocidade de processamento", "Teste para verificar se uma máquina se passa por humano", "Avaliação de algoritmos", "Teste de segurança de sistemas"], correta: 1 },
                    { pergunta: "Importância da Ética na IA?", opcoes: ["Não é importante", "Garantir transparência, segurança e evitar danos sociais", "Apenas para empresas grandes", "Somente em IA médica"], correta: 1 },
                    { pergunta: "O que é Deep Learning?", opcoes: ["Aprendizado superficial", "Subcampo do ML que usa múltiplas camadas de redes neurais", "Tipo de banco de dados", "Linguagem de programação"], correta: 1 },
                    { pergunta: "O que é IA Forte (AGI)?", opcoes: ["IA para jogos", "IA teórica com inteligência igual ou superior à humana", "IA para reconhecimento facial", "IA para tradução"], correta: 1 },
                    { pergunta: "Função de um Algoritmo de IA?", opcoes: ["Criar interfaces visuais", "Definir regras e cálculos para processar dados", "Gerenciar banco de dados", "Configurar redes"], correta: 1 },
                    { pergunta: "O que é Treinamento de Modelo?", opcoes: ["Instalar softwares de IA", "Ajustar parâmetros da IA usando dados conhecidos", "Criar novos algoritmos", "Testar a velocidade do sistema"], correta: 1 },
                    { pergunta: "O que é um Chatbot?", opcoes: ["Um vírus de computador", "Programa de IA para simular conversas com usuários", "Um tipo de firewall", "Um sistema de backup"], correta: 1 }
                ]
            }
        };

        /* pega o curso da URL */
        const params = new URLSearchParams(window.location.search);
        const cursoKey = params.get("curso") || "Front-End";
        const avaliacao = todasAvaliacoes[cursoKey];

        let atual = 0;
        let acertos = 0;
        let respostaSelecionada = null;

        document.getElementById("quiz-titulo").textContent = avaliacao.titulo;

        function mostrarPergunta() {
            const q = avaliacao.perguntas[atual];
            document.getElementById("quiz-progresso").textContent =
                `Questão ${atual + 1} de ${avaliacao.perguntas.length}`;
            document.getElementById("quiz-pergunta").textContent =
                `${atual + 1}. ${q.pergunta}`;

            const opcoes = document.getElementById("quiz-opcoes");
            opcoes.innerHTML = "";
            respostaSelecionada = null;
            document.getElementById("btn-enviar").disabled = true;

            const letras = ["A", "B", "C", "D"];
            q.opcoes.forEach((opcao, i) => {
                const li = document.createElement("li");
                li.className = "quiz-opcao";
                li.innerHTML = `<span class="opcao-letra">${letras[i]})</span> ${opcao}`;
                li.onclick = () => selecionarOpcao(li, i);
                opcoes.appendChild(li);
            });
        }

        function selecionarOpcao(el, indice) {
            document.querySelectorAll(".quiz-opcao").forEach(op => {
                op.classList.remove("selecionada");
            });
            el.classList.add("selecionada");
            respostaSelecionada = indice;
            document.getElementById("btn-enviar").disabled = false;
        }

        function enviarResposta() {
            const q = avaliacao.perguntas[atual];
            const opcoes = document.querySelectorAll(".quiz-opcao");

            opcoes.forEach((op, i) => {
                op.onclick = null;
                if (i === q.correta) op.classList.add("correta");
                else if (i === respostaSelecionada) op.classList.add("errada");
            });

            if (respostaSelecionada === q.correta) acertos++;
            document.getElementById("btn-enviar").disabled = true;

            setTimeout(() => {
                atual++;
                if (atual < avaliacao.perguntas.length) {
                    mostrarPergunta();
                } else {
                    mostrarResultado();
                }
            }, 1200);
        }

        function mostrarResultado() {
            const passou = acertos >= 7; /* precisa acertar 7 de 10 */

            if (passou) {
                /* marca módulo como concluído */
                localStorage.setItem(`concluido-${cursoKey}`, "true");
            }

            document.querySelector(".quiz-main").innerHTML = `
                <section class="resultado-card card">
                    <h1>${passou ? "🏆 Módulo Concluído!" : "😅 Tente novamente!"}</h1>
                    <p>Você acertou <strong>${acertos}</strong> de <strong>${avaliacao.perguntas.length}</strong></p>
                    <p>${passou
                        ? "Parabéns! Você concluiu este módulo com sucesso!"
                        : "Você precisa acertar pelo menos 7 questões para passar."
                    }</p>
                    <nav class="resultado-botoes">
                        ${passou
                            ? `<a href="curso.html?curso=${cursoKey}"><button class="btn-destaque">Ver Trilha →</button></a>`
                            : `<button class="btn-primario" onclick="location.reload()">Tentar novamente</button>`
                        }
                        <a href="dashboard-aluno.html"><button class="btn-primario">Início</button></a>
                    </nav>
                </section>
            `;
        }

        mostrarPergunta();
    </script>

    <script src="js/main.js"></script>

</body>
</html>
