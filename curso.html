<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSaber+ | Curso</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/curso.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav>
            <!-- logo leva para o dashboard do aluno -->
            <a href="dashboard-aluno.html">
                <span class="nav-logo">🎓 TechSaber+</span>
            </a>
            <span style="display:flex; gap:0.5rem;">
                <!-- voltar leva para a biblioteca de cursos -->
                <a href="biblioteca.html">
                    <button class="btn-primario">Voltar</button>
                </a>
            </span>
        </nav>
    </header>

    <main class="curso-main">

        <!-- título do curso preenchido pelo JS -->
        <section class="curso-titulo">
            <h1 id="titulo-curso"></h1>
        </section>

        <!-- trilha preenchida pelo JS -->
        <section class="trilha-vertical" id="trilha-vertical" aria-label="Trilha de atividades"></section>

        <!-- troféu aparece só quando módulo é concluído -->
        <article class="modulo-concluido" id="modulo-concluido" style="display:none;">
            <span class="modulo-icone" role="img" aria-label="Troféu">🏆</span>
            <p>Módulo concluído!</p>
        </article>

    </main>

    <script>
        /* DADOS DE CADA CURSO
           5 etapas na ordem:
           0 - Artigo 1  → etapa=1
           1 - Artigo 2  → etapa=2
           2 - Quiz 1    → quiz=1
           3 - Quiz 2    → quiz=2
           4 - Avaliação Final */

        const cursos = {
            "Front-End": {
                titulo: "Front <span class='destaque'>End</span>",
                atividades: [
                    { titulo: "HTML Semântico",      resumo: "Tags semânticas, DOM e estrutura de páginas web.",    tipo: "artigo1"   },
                    { titulo: "CSS3 e Estilização",  resumo: "Flexbox, Grid, Box Model e responsividade.",          tipo: "artigo2"   },
                    { titulo: "Quiz HTML",           resumo: "5 questões sobre HTML semântico.",                    tipo: "quiz1"     },
                    { titulo: "Quiz CSS",            resumo: "5 questões sobre CSS3 e estilização.",                tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões cobrindo todo o conteúdo de Front End.", tipo: "avaliacao" }
                ]
            },
            "Back-End": {
                titulo: "Back <span class='destaque'>End</span>",
                atividades: [
                    { titulo: "C# e .NET",           resumo: "CLR, tipos de dados e gerenciamento de memória.",     tipo: "artigo1"   },
                    { titulo: "POO em C#",           resumo: "Interfaces, LINQ, async/await e tratamento de erros.",tipo: "artigo2"   },
                    { titulo: "Quiz C# Básico",      resumo: "5 questões sobre C# e .NET.",                        tipo: "quiz1"     },
                    { titulo: "Quiz POO",            resumo: "5 questões sobre orientação a objetos em C#.",       tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões cobrindo todo o Back End.",              tipo: "avaliacao" }
                ]
            },
            "Banco-de-Dados": {
                titulo: "Banco de <span class='destaque'>Dados</span>",
                atividades: [
                    { titulo: "SQL Básico",          resumo: "SELECT, WHERE, JOIN e comandos essenciais.",          tipo: "artigo1"   },
                    { titulo: "SQL Avançado",        resumo: "ACID, normalização, views e data warehouse.",         tipo: "artigo2"   },
                    { titulo: "Quiz SQL Básico",     resumo: "5 questões sobre comandos SQL básicos.",              tipo: "quiz1"     },
                    { titulo: "Quiz SQL Avançado",   resumo: "5 questões sobre conceitos avançados de banco.",      tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões cobrindo todo o Banco de Dados.",        tipo: "avaliacao" }
                ]
            },
            "Engenharia-de-Software": {
                titulo: "Engenharia de <span class='destaque'>Software</span>",
                atividades: [
                    { titulo: "Manifesto e Scrum",   resumo: "Princípios ágeis, Sprints e cerimônias do Scrum.",   tipo: "artigo1"   },
                    { titulo: "Práticas Avançadas",  resumo: "CI, refatoração, MVP, UML e microserviços.",         tipo: "artigo2"   },
                    { titulo: "Quiz Scrum",          resumo: "5 questões sobre Scrum e metodologias ágeis.",       tipo: "quiz1"     },
                    { titulo: "Quiz Eng. Software",  resumo: "5 questões sobre práticas avançadas.",               tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões sobre Engenharia de Software.",         tipo: "avaliacao" }
                ]
            },
            "Soft-Skills": {
                titulo: "Soft <span class='destaque'>Skills</span>",
                atividades: [
                    { titulo: "Comunicação",         resumo: "Comunicação assertiva, escuta ativa e feedback.",    tipo: "artigo1"   },
                    { titulo: "Liderança",           resumo: "Liderança, inteligência emocional e resiliência.",   tipo: "artigo2"   },
                    { titulo: "Quiz Comunicação",    resumo: "5 questões sobre comunicação e trabalho em equipe.",tipo: "quiz1"     },
                    { titulo: "Quiz Liderança",      resumo: "5 questões sobre liderança e inteligência emocional.",tipo: "quiz2"   },
                    { titulo: "Avaliação Final",     resumo: "10 questões sobre Soft Skills.",                    tipo: "avaliacao" }
                ]
            },
            "Acessibilidade-Libras": {
                titulo: "Acessibilidade <span class='destaque'>Libras</span>",
                atividades: [
                    { titulo: "Introdução a Libras", resumo: "Lei 10.436, história e importância da Libras.",      tipo: "artigo1"   },
                    { titulo: "Gramática Libras",    resumo: "Classificadores, configuração de mão e cultura.",    tipo: "artigo2"   },
                    { titulo: "Quiz Libras Básico",  resumo: "5 questões sobre introdução à Libras.",              tipo: "quiz1"     },
                    { titulo: "Quiz Gramática",      resumo: "5 questões sobre gramática e cultura surda.",        tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões sobre Libras e Acessibilidade.",        tipo: "avaliacao" }
                ]
            },
            "Inteligencia-Artificial": {
                titulo: "Inteligência <span class='destaque'>Artificial</span>",
                atividades: [
                    { titulo: "Fundamentos de IA",   resumo: "Machine Learning, Deep Learning e IA Generativa.",   tipo: "artigo1"   },
                    { titulo: "IA Avançada",         resumo: "Ética, viés, redes neurais e processamento.",        tipo: "artigo2"   },
                    { titulo: "Quiz IA Básico",      resumo: "5 questões sobre fundamentos de IA.",                tipo: "quiz1"     },
                    { titulo: "Quiz IA Avançado",    resumo: "5 questões sobre IA avançada e ética.",              tipo: "quiz2"     },
                    { titulo: "Avaliação Final",     resumo: "10 questões sobre Inteligência Artificial.",        tipo: "avaliacao" }
                ]
            }
        };

        /* lados alternados da trilha */
        const lados = ["esquerda", "direita", "esquerda", "direita", "esquerda"];

        /* pega o curso da URL */
        const params   = new URLSearchParams(window.location.search);
        const cursoKey = params.get("curso") || "Front-End";
        const curso    = cursos[cursoKey] || cursos["Front-End"];
        localStorage.setItem("ultimoCursoNome", curso.titulo.replace(/<[^>]*>/g, ""));
        localStorage.setItem("ultimoCurso", cursoKey);

        /* lê o progresso do localStorage
           0 = só artigo 1 disponível (estado inicial)
           1 = artigo 1 lido → artigo 2 disponível
           2 = artigo 2 lido → quiz 1 disponível
           3 = quiz 1 passou → quiz 2 disponível
           4 = quiz 2 passou → avaliação disponível
           5 = avaliação passou → módulo concluído */

        const progressoKey = `progresso-${cursoKey}`;
        const concluido    = localStorage.getItem(`concluido-${cursoKey}`) === "true";
        const progresso    = parseInt(localStorage.getItem(progressoKey) || "0");

        /* preenche o título */
        document.getElementById("titulo-curso").innerHTML = curso.titulo;

        /* define o status de cada atividade */
        function getStatus(index) {
            if (concluido)          return "concluida";
            if (progresso > index)  return "concluida";
            if (progresso === index) return "andamento";
            return "bloqueada";
        }

        /* define o link correto de cada atividade */
        function getLink(tipo) {
            if (tipo === "artigo1")   return `artigo.html?curso=${cursoKey}&etapa=1`;
            if (tipo === "artigo2")   return `artigo.html?curso=${cursoKey}&etapa=2`;
            if (tipo === "quiz1")     return `quiz-modulo.html?curso=${cursoKey}&quiz=1`;
            if (tipo === "quiz2")     return `quiz-modulo.html?curso=${cursoKey}&quiz=2`;
            if (tipo === "avaliacao") return `avaliacao.html?curso=${cursoKey}`;
            return "#";
        }

        /* monta a trilha */
        const trilha = document.getElementById("trilha-vertical");

        curso.atividades.forEach((at, index) => {
            const status = getStatus(index);
            const lado   = lados[index];
            const link   = getLink(at.tipo);

            const article = document.createElement("article");
            article.className = `atividade-item ${lado} ${status}`;
            article.setAttribute("aria-label", `${at.titulo} — ${status}`);

            /* ícone do ponto central */
            let ponto = "🔒", tipoPonto = "bloqueado-ponto";
            if (status === "concluida") { ponto = "✔";  tipoPonto = "concluido-ponto"; }
            if (status === "andamento") { ponto = "📖"; tipoPonto = "andamento-ponto"; }

            const pontoHTML = `
                <span class="atividade-ponto ${tipoPonto}" role="img" aria-label="Status: ${status}">
                    ${ponto}
                </span>`;

            let conteudo = "";

            if (status === "andamento") {
                /* atividade disponível */
                conteudo = `
                    <section class="atividade-conteudo card andamento-card">
                        <header class="atividade-header">
                            <span class="badge-andamento-tag">ANDAMENTO</span>
                        </header>
                        <h2>${at.titulo}</h2>
                        <p>${at.resumo}</p>
                        <a href="${link}" aria-label="Iniciar ${at.titulo}">
                            <button class="btn-destaque">INICIAR</button>
                        </a>
                    </section>`;

            } else if (status === "concluida") {
                /* atividade concluída, pode rever */
                conteudo = `
                    <section class="atividade-conteudo card">
                        <h2>${at.titulo}</h2>
                        <p>${at.resumo}</p>
                        <a href="${link}" aria-label="Rever ${at.titulo}">
                            <button class="btn-primario" style="width:100%; margin-top:0.5rem;">↩ Rever</button>
                        </a>
                    </section>`;

            } else {
                /* atividade bloqueada */
                conteudo = `
                    <section class="atividade-conteudo card bloqueado-card" aria-disabled="true">
                        <h2>${at.titulo}</h2>
                        <p>${at.resumo}</p>
                        <p class="aviso-bloqueado">🔒 Complete o anterior primeiro</p>
                    </section>`;
            }

            article.innerHTML = lado === "esquerda"
                ? conteudo + pontoHTML + `<span class="vazio" aria-hidden="true"></span>`
                : `<span class="vazio" aria-hidden="true"></span>` + pontoHTML + conteudo;

            trilha.appendChild(article);
        });

        /* mostra troféu se concluído */
        if (concluido) {
            document.getElementById("modulo-concluido").style.display = "block";
        }
    </script>

    <script src="js/main.js"></script>

</body>
</html>
