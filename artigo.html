                        <p>Tags semânticas principais: <code>&lt;header&gt;</code> para cabeçalho, <code>&lt;nav&gt;</code> para navegação, <code>&lt;main&gt;</code> para conteúdo principal, <code>&lt;section&gt;</code> para seções, <code>&lt;article&gt;</code> para conteúdo independente, <code>&lt;aside&gt;</code> para conteúdo lateral e <code>&lt;footer&gt;</code> para rodapé.</p>

                        <p>Para selecionar uma <strong>classe</strong> usa-se <code>.nome</code>. Para selecionar um <strong>ID</strong> usa-se <code>#nome</code>. A propriedade <code>background-color</code> define a cor de fundo. A propriedade <code>font-size</code> define o tamanho da letra.</p>

           artigo 2 (etapa 2) → próximo é quiz 1
        ── */
        const btnProximo = document.getElementById("btn-proximo");
        const btnTexto   = document.getElementById("btn-proximo-texto");

        if (etapa === 1) {
            /* artigo 1 lido → avança progresso para 1 e vai para artigo 2 */
            btnTexto.textContent = "Próximo: Artigo 2 →";
            btnProximo.href = `artigo.html?curso=${cursoKey}&etapa=2`;
            btnProximo.addEventListener("click", () => {
                const progressoKey = `progresso-${cursoKey}`;
                const atual = parseInt(localStorage.getItem(progressoKey) || "0");
                /* só avança se ainda não passou dessa etapa */
                if (atual < 1) localStorage.setItem(progressoKey, "1");
            });
        } else {
            /* artigo 2 lido → avança progresso para 2 e vai para quiz 1 */
            btnTexto.textContent = "Iniciar Quiz 1 →";
            btnProximo.href = `quiz-modulo.html?curso=${cursoKey}&quiz=1`;
            btnProximo.addEventListener("click", () => {
                const progressoKey = `progresso-${cursoKey}`;
                const atual = parseInt(localStorage.getItem(progressoKey) || "0");
                if (atual < 2) localStorage.setItem(progressoKey, "2");
            });
        }
    </script>

    <script src="js/main.js"></script>

</body>
</html>
