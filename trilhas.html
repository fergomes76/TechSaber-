<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSaber+ | Trilhas</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/trilhas.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav>
            <span class="nav-logo">🎓 TechSaber+</span>
            <span style="display:flex; gap:0.5rem;">
                <a href="dashboard-aluno.html"><button class="btn-primario">Voltar</button></a>
            </span>
        </nav>
    </header>

    <main class="trilhas-main">

        <!-- SEÇÃO BOAS VINDAS + OFENSIVA -->
        <section class="bemvindo-section">

            <article class="bemvindo-texto">
                <h1>Bem-vindo de volta, <span class="destaque">Aluno!</span></h1>
                <p>Você está a apenas 2 lições de concluir o módulo "Banco de dados". Mantenha o ritmo!</p>
            </article>

            <!-- card ofensiva clicável -->
            <article class="card ofensiva-card" onclick="localStorage.setItem('origemOfensiva','trilhas.html'); window.location.href='ofensiva.html'">
                <span class="ofensiva-fogo">🔥</span>
                <strong class="ofensiva-numero">12</strong>
                <p>DIAS CONSECUTIVOS</p>
                <div class="ofensiva-barras">
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra ativa"></span>
                    <span class="barra"></span>
                </div>
            </article>

        </section>

        <!-- SEÇÃO MINI TRILHA -->
        <section class="trilha-section">
            <article class="card trilha-card" onclick="window.location.href='curso.html?curso=' + (localStorage.getItem('ultimoCurso') || 'Front-End')">

                <ol class="trilha-passos">
                    <li class="passo concluido">✔</li>
                    <li class="passo andamento">
                        <span class="badge-andamento">ANDAMENTO</span>
                        📖
                    </li>
                    <li class="passo bloqueado">🔒</li>
                    <li class="passo bloqueado">🔒</li>
                    <li class="passo bloqueado">🔒</li>
                </ol>

            </article>
        </section>

        <!-- SEÇÃO CURSOS EM ANDAMENTO -->
        <section class="cursos-section">

            <article class="card curso-andamento">
                <header class="curso-header">
                    <h2>Banco de dados</h2>
                    <span>74%</span>
                </header>
                <progress value="74" max="100"></progress>
                <a href="curso.html">Voltar ▶</a>
            </article>

            <article class="card curso-andamento">
                <header class="curso-header">
                    <h2>Front-end</h2>
                    <span>12%</span>
                </header>
                <progress value="12" max="100"></progress>
                <a href="curso.html?curso=Front-End">Voltar ▶</a>
            </article>

        </section>

    </main>

    <script>
        /* primeiro acesso vindo do cadastro — exibe tela zerada */
        if (localStorage.getItem("primeiroAcesso") === "true") {
            localStorage.removeItem("primeiroAcesso");

            /* limpa todo o progresso dos cursos */
            const cursos = ["Front-End","Back-End","Banco-de-Dados","Engenharia-de-Software","Soft-Skills","Acessibilidade-Libras","Inteligencia-Artificial"];
            cursos.forEach(c => {
                localStorage.removeItem(`progresso-${c}`);
                localStorage.removeItem(`concluido-${c}`);
            });

            document.querySelector(".bemvindo-texto h1").innerHTML = 'Bem-vindo, <span class="destaque">Aluno!</span>';
            document.querySelector(".bemvindo-texto p").textContent = "Comece sua primeira trilha agora!";

            document.querySelector(".ofensiva-numero").textContent = "0";
            document.querySelectorAll(".barra").forEach(b => b.classList.remove("ativa"));

            const passos = document.querySelectorAll(".passo");
            passos[0].className = "passo andamento";
            passos[0].innerHTML = '<span class="badge-andamento">ANDAMENTO</span>📖';
            passos[1].className = "passo bloqueado";
            passos[1].textContent = "🔒";

            document.querySelector(".cursos-section").style.display = "none";

        } else {
            /* acesso normal — lê progresso do localStorage */
            const todosCursos = ["Front-End","Back-End","Banco-de-Dados","Engenharia-de-Software","Soft-Skills","Acessibilidade-Libras","Inteligencia-Artificial"];

            /* dias consecutivos: incrementa 1 por dia de acesso */
            const hoje = new Date().toDateString();
            const ultimoAcesso = localStorage.getItem("ultimoAcesso");
            let dias = parseInt(localStorage.getItem("diasConsecutivos") || "0");

            if (ultimoAcesso !== hoje) {
                dias += 1;
                localStorage.setItem("diasConsecutivos", dias);
                localStorage.setItem("ultimoAcesso", hoje);
            }

            document.querySelector(".ofensiva-numero").textContent = dias;
            const barras = document.querySelectorAll(".barra");
            barras.forEach((b, i) => {
                if (i < dias) b.classList.add("ativa");
                else b.classList.remove("ativa");
            });

            /* atualiza mini trilha com base no último curso acessado */
            const ultimoCurso = localStorage.getItem("ultimoCurso");
            if (ultimoCurso) {
                const progUltimo = parseInt(localStorage.getItem(`progresso-${ultimoCurso}`) || "0");
                const passos = document.querySelectorAll(".passo");
                passos.forEach((p, i) => {
                    if (i < progUltimo) {
                        p.className = "passo concluido";
                        p.textContent = "✔";
                    } else if (i === progUltimo) {
                        p.className = "passo andamento";
                        p.innerHTML = '<span class="badge-andamento">ANDAMENTO</span>📖';
                    } else {
                        p.className = "passo bloqueado";
                        p.textContent = "🔒";
                    }
                });

                /* atualiza texto de boas vindas */
                const ultimoNome = localStorage.getItem("ultimoCursoNome");
                const faltam = 5 - progUltimo;
                if (ultimoNome && faltam > 0) {
                    document.querySelector(".bemvindo-texto p").textContent =
                        `Você está a apenas ${faltam} ${faltam === 1 ? "lição" : "lições"} de concluir o módulo "${ultimoNome}". Mantenha o ritmo!`;
                }
            }

            /* monta cursos em andamento */
            const cursosSection = document.querySelector(".cursos-section");
            const cursosComProgresso = todosCursos
                .filter(c => parseInt(localStorage.getItem(`progresso-${c}`) || "0") > 0)
                .slice(0, 2);

            if (cursosComProgresso.length === 0) {
                cursosSection.style.display = "none";
            } else {
                cursosSection.innerHTML = "";
                const nomes = {
                    "Front-End": "Front-end",
                    "Back-End": "Back-end",
                    "Banco-de-Dados": "Banco de dados",
                    "Engenharia-de-Software": "Engenharia de Software",
                    "Soft-Skills": "Soft Skills",
                    "Acessibilidade-Libras": "Acessibilidade Libras",
                    "Inteligencia-Artificial": "Inteligência Artificial"
                };

                cursosComProgresso.forEach(c => {
                    const progresso = parseInt(localStorage.getItem(`progresso-${c}`) || "0");
                    const concluido = localStorage.getItem(`concluido-${c}`) === "true";
                    const percentual = concluido ? 100 : Math.round((progresso / 5) * 100);

                    const article = document.createElement("article");
                    article.className = "card curso-andamento";
                    article.innerHTML = `
                        <header class="curso-header">
                            <h2>${nomes[c]}</h2>
                            <span>${percentual}%</span>
                        </header>
                        <progress value="${percentual}" max="100"></progress>
                        <a href="curso.html?curso=${c}">Continuar ▶</a>
                    `;
                    cursosSection.appendChild(article);
                });
            }
        }
    </script>

    <script src="js/main.js"></script>

</body>
</html>
